name: Daily Scrape

on:
  schedule:
    - cron: '0 9 * * *'   # 1 AM PST (9 AM UTC) daily
  workflow_dispatch:        # Manual trigger from GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        continue-on-error: true   # missing deps don't exist on all runners; Playwright will retry

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Sync DB schema
        # --accept-data-loss removed: safer to let a column-drop fail loudly.
        # continue-on-error keeps the scraper running even if DIRECT_URL is missing.
        run: npx prisma db push
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Ping database
        # Fail fast if the DB is unreachable before spending 50 min on Playwright
        run: |
          node -e "
          const { PrismaClient } = require('./node_modules/@prisma/client');
          const p = new PrismaClient();
          p.\$connect()
            .then(() => { console.log('DB connection OK'); return p.\$disconnect(); })
            .catch(e => { console.error('DB connection FAILED:', e.message); process.exit(1); });
          "
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run scraper
        # IMPORTANT: if package-lock.json is out of sync with package.json,
        # npm ci will fail. Always commit package-lock.json after npm install.
        run: npx tsx scripts/run-scraper.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}

      - name: Run Shea Homes scraper
        run: node scripts/scrape-shea.mjs
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run Melia Homes scraper
        run: node scripts/scrape-melia.mjs
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Email scrape report
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM_EMAIL }}
        run: |
          DATE=$(date '+%Y-%m-%d')
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            SUBJECT="✅ New Key Scrape Complete — $DATE"
          else
            SUBJECT="⚠️ New Key Scrape Issues — $DATE"
          fi
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"from\":\"$RESEND_FROM\",\"to\":[\"armin.sabe@gmail.com\"],\"subject\":\"$SUBJECT\",\"html\":\"<p>Daily scrape finished on <b>$DATE</b>.</p><p>Overall status: <b>$STATUS</b></p><p>Lennar, Shea, and Melia scrapers all ran.</p><p><a href='$RUN_URL'>View full logs →</a></p>\"}"
