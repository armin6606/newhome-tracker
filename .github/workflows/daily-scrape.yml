name: Daily Scrape

on:
  schedule:
    - cron: '0 8 * * *'   # 1 AM PDT (8 AM UTC) / 1 AM PST (use 0 9 * * *) daily
  workflow_dispatch:        # Manual trigger from GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        continue-on-error: true   # missing deps don't exist on all runners; Playwright will retry

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Sync DB schema
        # --accept-data-loss removed: safer to let a column-drop fail loudly.
        # continue-on-error keeps the scraper running even if DIRECT_URL is missing.
        run: npx prisma db push
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Validate required secrets
        run: |
          MISSING=""
          [ -z "$DATABASE_URL" ]    && MISSING="$MISSING DATABASE_URL"
          [ -z "$RESEND_API_KEY" ]  && MISSING="$MISSING RESEND_API_KEY"
          if [ -n "$MISSING" ]; then
            echo "❌ Missing required secrets:$MISSING"
            exit 1
          fi
          echo "✅ All required secrets present"
        env:
          DATABASE_URL:   ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Ping database
        # Fail fast if the DB is unreachable before spending 50 min on Playwright
        run: |
          node -e "
          const { PrismaClient } = require('./node_modules/@prisma/client');
          const p = new PrismaClient();
          p.\$connect()
            .then(() => { console.log('DB connection OK'); return p.\$disconnect(); })
            .catch(e => { console.error('DB connection FAILED:', e.message); process.exit(1); });
          "
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Scrape — Toll Brothers
        id: toll-brothers
        continue-on-error: true
        run: node --max-old-space-size=4096 node_modules/.bin/tsx scripts/scrapers/toll-brothers.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Scrape — Lennar
        id: lennar
        continue-on-error: true
        run: node --max-old-space-size=4096 node_modules/.bin/tsx scripts/scrapers/lennar.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Scrape — Pulte
        id: pulte
        continue-on-error: true
        run: node --max-old-space-size=4096 node_modules/.bin/tsx scripts/scrapers/pulte.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Scrape — Del Webb
        id: del-webb
        continue-on-error: true
        run: node --max-old-space-size=4096 node_modules/.bin/tsx scripts/scrapers/del-webb.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Scrape — KB Home
        id: kb-home
        continue-on-error: true
        run: node --max-old-space-size=4096 node_modules/.bin/tsx scripts/scrapers/kb-home.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Scrape — Taylor Morrison
        id: taylor-morrison
        continue-on-error: true
        run: node --max-old-space-size=4096 node_modules/.bin/tsx scripts/scrapers/taylor-morrison.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Scrape — Melia Homes
        id: melia-homes
        continue-on-error: true
        run: node --max-old-space-size=4096 node_modules/.bin/tsx scripts/scrapers/melia-homes.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Scrape — Shea Homes
        id: shea-homes
        continue-on-error: true
        run: node scripts/scrape-shea.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Send daily report email
        if: always()
        run: node scripts/send-daily-report.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL:   ${{ secrets.DIRECT_URL }}
