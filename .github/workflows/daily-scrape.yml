name: Daily Scrape

on:
  schedule:
    - cron: '17 8 * * *'   # 1:17 AM Pacific during daylight saving time
    - cron: '17 9 * * *'   # 1:17 AM Pacific during standard time
    - cron: '3 10 * * *'   # watchdog after the 1:17 AM Pacific run
  workflow_dispatch:        # Manual trigger from GitHub Actions UI

permissions:
  actions: read
  contents: read

jobs:
  gate:
    name: Decide whether to run
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      reason: ${{ steps.decide.outputs.reason }}
    steps:
      - name: Check today's Daily Scrape runs
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          REPOSITORY: ${{ github.repository }}
          WORKFLOW_FILE: daily-scrape.yml
          DST_PRIMARY_SCHEDULE: "17 8 * * *"
          STANDARD_PRIMARY_SCHEDULE: "17 9 * * *"
          WATCHDOG_SCHEDULE: "3 10 * * *"
        run: |
          node <<'NODE'
          const fs = require("fs")

          async function main() {
            const outPath = process.env.GITHUB_OUTPUT
            const write = (key, value) => fs.appendFileSync(outPath, `${key}=${String(value).replace(/\r?\n/g, " ")}\n`)

            const eventName = process.env.EVENT_NAME
            const eventSchedule = process.env.EVENT_SCHEDULE || ""

            if (eventName !== "schedule") {
              write("should_run", "true")
              write("reason", "manual run")
              return
            }

            const pacificHourForUtcSchedule = (schedule) => {
              const [minute, hour] = schedule.split(" ")
              const now = new Date()
              const scheduledUtc = new Date(Date.UTC(
                now.getUTCFullYear(),
                now.getUTCMonth(),
                now.getUTCDate(),
                Number(hour),
                Number(minute),
              ))
              return new Intl.DateTimeFormat("en-US", {
                timeZone: "America/Los_Angeles",
                hour: "2-digit",
                hourCycle: "h23",
              }).format(scheduledUtc)
            }

            const isPrimarySchedule = [
              process.env.DST_PRIMARY_SCHEDULE,
              process.env.STANDARD_PRIMARY_SCHEDULE,
            ].includes(eventSchedule)

            if (isPrimarySchedule && pacificHourForUtcSchedule(eventSchedule) === "01") {
              write("should_run", "true")
              write("reason", "primary 1:17 AM Pacific schedule")
              return
            }

            if (isPrimarySchedule) {
              write("should_run", "false")
              write("reason", "skipped alternate 1:17 cron for the current Pacific offset")
              return
            }

            const pacificDate = (iso) => new Intl.DateTimeFormat("en-CA", {
              timeZone: "America/Los_Angeles",
              year: "numeric",
              month: "2-digit",
              day: "2-digit",
            }).format(new Date(iso))

            const todayPacific = pacificDate(new Date().toISOString())
            const url = `https://api.github.com/repos/${process.env.REPOSITORY}/actions/workflows/${process.env.WORKFLOW_FILE}/runs?branch=main&per_page=50`
            const res = await fetch(url, {
              headers: {
                Authorization: `Bearer ${process.env.GH_TOKEN}`,
                Accept: "application/vnd.github+json",
                "X-GitHub-Api-Version": "2022-11-28",
              },
            })

            if (!res.ok) {
              const body = await res.text()
              console.log(`Could not check prior runs (${res.status}): ${body.slice(0, 300)}`)
              write("should_run", "true")
              write("reason", "watchdog could not verify prior run")
              return
            }

            const data = await res.json()
            const currentRunId = Number(process.env.RUN_ID)
            const activeStatuses = ["queued", "in_progress", "waiting", "pending", "requested"]

            const priorRun = (data.workflow_runs || []).find((run) => {
              if (run.id === currentRunId) return false
              if (pacificDate(run.created_at) !== todayPacific) return false
              if (!["schedule", "workflow_dispatch"].includes(run.event)) return false
              if (activeStatuses.includes(run.status)) return true

              const createdAt = new Date(run.created_at).getTime()
              const updatedAt = new Date(run.updated_at).getTime()
              const durationSeconds = Number.isFinite(createdAt) && Number.isFinite(updatedAt)
                ? (updatedAt - createdAt) / 1000
                : 0

              // Gate-only skipped runs complete in a few seconds and never send reports.
              return run.conclusion === "success" && durationSeconds >= 15 * 60
            })

            if (priorRun) {
              write("should_run", "false")
              write("reason", `watchdog skipped; prior ${priorRun.event} run ${priorRun.id} is ${priorRun.status}/${priorRun.conclusion || "not finished"}`)
            } else {
              write("should_run", "true")
              write("reason", "watchdog found no successful or active run today")
            }
          }

          main().catch((err) => {
            console.error(err)
            process.exit(1)
          })
          NODE

      - name: Show decision
        run: echo "${{ steps.decide.outputs.reason }}"

  # ── Pre-scrape snapshot ────────────────────────────────────────────────────
  snapshot:
    name: Pre-scrape Snapshot
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Check for named functions in page.evaluate() (esbuild __name guard)
        run: node scripts/check-evaluate-functions.mjs

      - name: Run pre-scrape snapshot
        continue-on-error: true   # never block scrapers if snapshot fails
        run: node scripts/snapshot-11pm.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── Each builder runs on its own parallel runner ──────────────────────────
  scrape:
    needs: snapshot   # wait for snapshot before scraping
    name: Scrape — ${{ matrix.builder }}
    runs-on: ubuntu-latest
    timeout-minutes: 90     # overall cap per runner (setup ~15 min + scraper timeout)
    strategy:
      fail-fast: false       # one builder failing never cancels the others
      matrix:
        include:
          - builder: "Toll Brothers"
            id: toll-brothers
            cmd: "node --max-old-space-size=4096 node_modules/.bin/tsx scripts/scrapers/toll-brothers.ts"
            timeout: 60
          - builder: "Lennar"
            id: lennar
            cmd: "node --max-old-space-size=4096 node_modules/.bin/tsx scripts/scrapers/lennar.ts"
            timeout: 80
          - builder: "Pulte"
            id: pulte
            cmd: "node --max-old-space-size=4096 node_modules/.bin/tsx scripts/scrapers/pulte.ts"
            timeout: 45
          - builder: "Del Webb"
            id: del-webb
            cmd: "node --max-old-space-size=4096 node_modules/.bin/tsx scripts/scrapers/del-webb.ts"
            timeout: 45
          - builder: "KB Home"
            id: kb-home
            cmd: "node --max-old-space-size=4096 node_modules/.bin/tsx scripts/scrapers/kb-home.ts"
            timeout: 45
          - builder: "Taylor Morrison"
            id: taylor-morrison
            cmd: "node --max-old-space-size=4096 node_modules/.bin/tsx scripts/scrapers/taylor-morrison.ts"
            timeout: 45
          - builder: "Melia Homes"
            id: melia-homes
            cmd: "node --max-old-space-size=4096 node_modules/.bin/tsx scripts/scrapers/melia-homes.ts"
            timeout: 30
          - builder: "Trumark"
            id: trumark
            cmd: "node --max-old-space-size=4096 node_modules/.bin/tsx scripts/scrapers/trumark.ts"
            timeout: 20
          - builder: "Shea Homes"
            id: shea-homes
            cmd: "node scripts/scrape-shea.mjs"
            timeout: 30
          - builder: "Brookfield Residential"
            id: brookfield
            cmd: 'node "Brookfield Agent/scripts/scrape-brookfield.mjs"'
            timeout: 20
          - builder: "TRI Pointe Homes"
            id: tripointe
            cmd: 'node "TriPointe Agent/scripts/scrape-tripointe.mjs"'
            timeout: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        continue-on-error: true   # missing deps don't exist on all runners; Playwright will retry

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Sync DB schema
        # continue-on-error keeps the scraper running even if DIRECT_URL is missing
        run: npx prisma db push
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL:   ${{ secrets.DIRECT_URL }}

      - name: Validate required secrets
        run: |
          MISSING=""
          [ -z "$DATABASE_URL" ]   && MISSING="$MISSING DATABASE_URL"
          [ -z "$RESEND_API_KEY" ] && MISSING="$MISSING RESEND_API_KEY"
          if [ -n "$MISSING" ]; then
            echo "❌ Missing required secrets:$MISSING"
            exit 1
          fi
          echo "✅ All required secrets present"
        env:
          DATABASE_URL:   ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Ping database
        # Fail fast if the DB is unreachable before spending time on Playwright
        run: |
          node -e "
          const { PrismaClient } = require('./node_modules/@prisma/client');
          const p = new PrismaClient();
          p.\$connect()
            .then(() => { console.log('DB connection OK'); return p.\$disconnect(); })
            .catch(e => { console.error('DB connection FAILED:', e.message); process.exit(1); });
          "
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Record scraper start time
        run: echo "SCRAPER_START=$(date -u +%s)" >> $GITHUB_ENV

      - name: Run scraper
        id: run_scraper
        continue-on-error: true
        timeout-minutes: ${{ matrix.timeout }}
        run: ${{ matrix.cmd }}
        env:
          DATABASE_URL:                ${{ secrets.DATABASE_URL }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

      - name: Save scrape result
        if: always()
        run: |
          END=$(date -u +%s)
          START=${SCRAPER_START:-$END}
          ELAPSED=$((END - START))
          TIMEOUT_SECS=$((${{ matrix.timeout }} * 60))
          OUTCOME="${{ steps.run_scraper.outcome }}"

          if [ "$OUTCOME" = "success" ]; then
            STATUS="success"
          elif [ "$OUTCOME" != "skipped" ] && [ "$ELAPSED" -ge "$((TIMEOUT_SECS - 30))" ]; then
            STATUS="timeout"
          else
            STATUS="failure"
          fi

          START_ISO=$(date -u -d @"$START" +%Y-%m-%dT%H:%M:%SZ)
          END_ISO=$(date -u -d @"$END" +%Y-%m-%dT%H:%M:%SZ)

          printf '{"builder":"%s","status":"%s","startedAt":"%s","finishedAt":"%s"}\n' \
            "${{ matrix.builder }}" "$STATUS" "$START_ISO" "$END_ISO" \
            > scrape-result.json

          echo "Scrape result: $(cat scrape-result.json)"

      - name: Upload scrape result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-result-${{ matrix.id }}
          path: scrape-result.json
          retention-days: 3

  # ── Report job always runs, even if every scraper failed ──────────────────
  fill-table3:
    name: Fill Table 3 Fields
    runs-on: ubuntu-latest
    needs: scrape
    if: always() && needs.scrape.result != 'skipped'
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Fill missing listing fields from Table 3
        run: node scripts/fill-table3.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  report:
    name: Send Daily Report
    runs-on: ubuntu-latest
    needs: [scrape, fill-table3]
    if: always() && needs.scrape.result != 'skipped'
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Download scrape results
        uses: actions/download-artifact@v4
        with:
          pattern: scrape-result-*
          path: /tmp/scrape-results
        continue-on-error: true   # report still sends even if artifacts are missing

      - name: Merge scrape results
        run: |
          node -e "
          const fs   = require('fs');
          const path = require('path');
          const results = {};
          const baseDir = '/tmp/scrape-results';
          if (fs.existsSync(baseDir)) {
            for (const artifactDir of fs.readdirSync(baseDir)) {
              const jsonPath = path.join(baseDir, artifactDir, 'scrape-result.json');
              if (fs.existsSync(jsonPath)) {
                try {
                  const d = JSON.parse(fs.readFileSync(jsonPath, 'utf8'));
                  if (d.builder) results[d.builder] = d;
                } catch (e) { console.warn('Failed to parse', jsonPath, e.message); }
              }
            }
          }
          const builders = Object.keys(results);
          console.log('Merged results for:', builders.join(', ') || '(none)');
          fs.writeFileSync('/tmp/scrape-results.json', JSON.stringify(results, null, 2));
          "

      - name: Normalize no-price active listings
        if: always()
        timeout-minutes: 5
        run: npx tsx scripts/fix-no-price-active-to-future.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Monitor — detect anomalies and alert
        if: always()
        timeout-minutes: 5
        run: node scripts/monitor-scrapers.mjs
        env:
          DATABASE_URL:     ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY:   ${{ secrets.RESEND_API_KEY }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send daily report email
        if: always()
        timeout-minutes: 10
        run: node scripts/send-daily-report.mjs
        env:
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          DIRECT_URL:         ${{ secrets.DIRECT_URL }}
          RESEND_API_KEY:     ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL:  info@newkey.us
          WORKFLOW_RUN_URL:   ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
