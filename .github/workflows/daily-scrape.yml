name: Daily Scrape

on:
  schedule:
    - cron: '0 9 * * *'   # 1 AM PST (9 AM UTC) daily
  workflow_dispatch:        # Manual trigger from GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        continue-on-error: true   # missing deps don't exist on all runners; Playwright will retry

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Sync DB schema
        # --accept-data-loss removed: safer to let a column-drop fail loudly.
        # continue-on-error keeps the scraper running even if DIRECT_URL is missing.
        run: npx prisma db push
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Ping database
        # Fail fast if the DB is unreachable before spending 50 min on Playwright
        run: |
          node -e "
          const { PrismaClient } = require('./node_modules/@prisma/client');
          const p = new PrismaClient();
          p.\$connect()
            .then(() => { console.log('DB connection OK'); return p.\$disconnect(); })
            .catch(e => { console.error('DB connection FAILED:', e.message); process.exit(1); });
          "
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run main scraper (Toll Brothers, Lennar, Pulte, Del Webb, KB Home, Taylor Morrison, Melia)
        id: main
        # IMPORTANT: if package-lock.json is out of sync with package.json,
        # npm ci will fail. Always commit package-lock.json after npm install.
        run: npx tsx scripts/run-scraper.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}

      - name: Run Shea Homes scraper
        id: shea
        run: node scripts/scrape-shea.mjs
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run Melia Homes scraper
        id: melia
        run: node scripts/scrape-melia.mjs
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Email scrape report
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM_EMAIL }}
        run: |
          DATE=$(date '+%Y-%m-%d')
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # All 9 builders write to /tmp/scrape-results.json — build the full email table from it
          node -e "
            const fs = require('fs');
            let data = {};
            try { data = JSON.parse(fs.readFileSync('/tmp/scrape-results.json', 'utf8')); } catch(e) {}

            const th = s => '<th style=\"padding:6px 16px 6px 0;text-align:left;border-bottom:2px solid #ddd;font-size:13px;color:#555\">' + s + '</th>';
            const td = (s, opts='') => '<td style=\"padding:5px 16px 5px 0;font-size:13px;' + opts + '\">' + s + '</td>';

            let anyFail = false;
            let rows = '';
            for (const [name, d] of Object.entries(data)) {
              const ok   = d.communities - d.errorCount;
              const fail = d.errorCount;
              if (fail > 0) anyFail = true;
              const icon = fail === 0 ? '✅' : '❌';
              rows += '<tr>';
              rows += td(icon + ' ' + name);
              rows += td(String(d.communities), 'text-align:center');
              rows += td(String(ok),   'text-align:center;color:green');
              rows += td(fail > 0 ? '<b style=\"color:red\">' + fail + '</b>' : '0', 'text-align:center');
              rows += '</tr>';
              if (d.errors && d.errors.length > 0) {
                rows += '<tr><td colspan=4 style=\"padding:0 0 6px 22px;font-size:11px;color:#c00\">' +
                  d.errors.map(e => '• ' + e).join('<br>') + '</td></tr>';
              }
            }

            if (!rows) {
              rows = '<tr><td colspan=4 style=\"color:orange\">⚠️ No results written — scraper may have failed before completing</td></tr>';
              anyFail = true;
            }

            const subject = anyFail
              ? '⚠️ New Key Scrape Issues — $DATE'
              : '✅ New Key Scrape Complete — $DATE';

            const html =
              '<p style=\"font-family:sans-serif\"><b>Daily scrape report — $DATE</b></p>' +
              '<table style=\"border-collapse:collapse;font-family:sans-serif\">' +
              '<thead><tr>' + th('Builder') + th('Total') + th('✅ OK') + th('❌ Failed') + '</tr></thead>' +
              '<tbody>' + rows + '</tbody></table>' +
              '<br><a href=\"$RUN_URL\" style=\"font-family:sans-serif\">View full logs →</a>';

            const out = JSON.stringify({ subject, html });
            fs.writeFileSync('/tmp/email-payload.json', out);
            process.stdout.write('Subject: ' + subject + '\n');
          "

          SUBJECT=$(node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('/tmp/email-payload.json')).subject)")
          HTML=$(node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('/tmp/email-payload.json')).html)")

          curl -s -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"from\":\"$RESEND_FROM\",\"to\":[\"armin.sabe@gmail.com\"],\"subject\":\"$SUBJECT\",\"html\":\"$HTML\"}"
