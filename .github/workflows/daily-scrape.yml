name: Daily Scrape

on:
  schedule:
    - cron: '0 9 * * *'   # 1 AM PST (9 AM UTC) daily
  workflow_dispatch:        # Manual trigger from GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        continue-on-error: true   # missing deps don't exist on all runners; Playwright will retry

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Sync DB schema
        # --accept-data-loss removed: safer to let a column-drop fail loudly.
        # continue-on-error keeps the scraper running even if DIRECT_URL is missing.
        run: npx prisma db push
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Ping database
        # Fail fast if the DB is unreachable before spending 50 min on Playwright
        run: |
          node -e "
          const { PrismaClient } = require('./node_modules/@prisma/client');
          const p = new PrismaClient();
          p.\$connect()
            .then(() => { console.log('DB connection OK'); return p.\$disconnect(); })
            .catch(e => { console.error('DB connection FAILED:', e.message); process.exit(1); });
          "
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run main scraper (Toll Brothers, Lennar, Pulte, Del Webb, KB Home, Taylor Morrison, Melia)
        id: main
        # IMPORTANT: if package-lock.json is out of sync with package.json,
        # npm ci will fail. Always commit package-lock.json after npm install.
        run: npx tsx scripts/run-scraper.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}

      - name: Run Shea Homes scraper
        id: shea
        run: node scripts/scrape-shea.mjs
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run Melia Homes scraper
        id: melia
        run: node scripts/scrape-melia.mjs
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Email scrape report
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM_EMAIL }}
          SHEA_RESULT: ${{ steps.shea.outcome }}
          MELIA_RESULT: ${{ steps.melia.outcome }}
        run: |
          DATE=$(date '+%Y-%m-%d')
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Build one HTML row per builder from the results file written by run-scraper.ts
          BUILDER_ROWS=$(node -e "
            const fs = require('fs');
            const icon = s => s === 'success' ? '✅' : '❌';
            let rows = '';
            try {
              const r = JSON.parse(fs.readFileSync('/tmp/scrape-results.json', 'utf8'));
              rows = Object.entries(r).map(([name, status]) =>
                '<tr><td style=\"padding:4px 12px 4px 0\">' + icon(status) + ' ' + name + '</td><td><b>' + status + '</b></td></tr>'
              ).join('');
            } catch(e) {
              rows = '<tr><td colspan=2>⚠️ Main scraper results unavailable</td></tr>';
            }
            process.stdout.write(rows);
          ")

          # Shea and Melia standalone have their own step outcomes
          SHEA_ICON=$([ "$SHEA_RESULT" = "success" ] && echo "✅" || echo "❌")
          MELIA_ICON=$([ "$MELIA_RESULT" = "success" ] && echo "✅" || echo "❌")
          SHEA_ROW="<tr><td style='padding:4px 12px 4px 0'>$SHEA_ICON Shea Homes</td><td><b>$SHEA_RESULT</b></td></tr>"
          MELIA_ROW="<tr><td style='padding:4px 12px 4px 0'>$MELIA_ICON Melia Homes (standalone)</td><td><b>$MELIA_RESULT</b></td></tr>"

          # Subject: fail if any step failed
          if [ "$SHEA_RESULT" != "success" ] || [ "$MELIA_RESULT" != "success" ] || \
             node -e "try{const r=JSON.parse(require('fs').readFileSync('/tmp/scrape-results.json'));if(Object.values(r).some(v=>v!=='success'))process.exit(1)}catch{process.exit(1)}"; then
            SUBJECT="⚠️ New Key Scrape Issues — $DATE"
          else
            SUBJECT="✅ New Key Scrape Complete — $DATE"
          fi

          HTML="<p><b>Daily scrape report — $DATE</b></p><table style='border-collapse:collapse;margin-top:8px'>$BUILDER_ROWS$SHEA_ROW$MELIA_ROW</table><br><a href='$RUN_URL'>View full logs →</a>"

          curl -s -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"from\":\"$RESEND_FROM\",\"to\":[\"armin.sabe@gmail.com\"],\"subject\":\"$SUBJECT\",\"html\":\"$HTML\"}"
