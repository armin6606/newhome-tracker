name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck, scraper guards, audit, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: npm run typecheck
      - run: npm run test:scraper-guards
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
