name: Run Lennar Scraper

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lennar:
    name: Run Lennar
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        continue-on-error: true

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Sync DB schema
        run: npx prisma db push
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Ping database
        run: |
          node -e "
          const { PrismaClient } = require('./node_modules/@prisma/client');
          const p = new PrismaClient();
          p.\$connect()
            .then(() => { console.log('DB connection OK'); return p.\$disconnect(); })
            .catch(e => { console.error('DB connection FAILED:', e.message); process.exit(1); });
          "
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run Lennar scraper
        run: node --max-old-space-size=4096 node_modules/.bin/tsx scripts/scrapers/lennar.ts
        timeout-minutes: 80
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

      - name: Normalize no-price active listings
        if: always()
        timeout-minutes: 5
        run: npx tsx scripts/fix-no-price-active-to-future.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
