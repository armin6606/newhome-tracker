name: Maintenance

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Maintenance task to run"
        required: true
        type: choice
        options:
          - no-price-active-to-future
          - merge-duplicate-communities
          - reject-false-promos
          - fill-table3

jobs:
  run:
    name: Run maintenance task
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Move no-price active listings to future
        if: ${{ inputs.task == 'no-price-active-to-future' }}
        run: npx tsx scripts/fix-no-price-active-to-future.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Merge duplicate communities
        if: ${{ inputs.task == 'merge-duplicate-communities' }}
        run: npx tsx scripts/merge-duplicate-communities.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Reject false promo submissions
        if: ${{ inputs.task == 'reject-false-promos' }}
        run: npx tsx scripts/reject-false-promo-submissions.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Fill missing listing fields from Table 3
        if: ${{ inputs.task == 'fill-table3' }}
        run: node scripts/fill-table3.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
