name: Snapshot 11 PM

on:
  schedule:
    - cron: '0 6 * * *'   # 6 AM UTC = 11 PM PDT
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Capture 11 PM snapshot
        run: |
          curl --fail-with-body --max-time 30 -X GET \
            "https://www.newkey.us/api/cron/hourly-scrape" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
