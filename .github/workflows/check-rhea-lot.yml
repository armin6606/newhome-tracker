name: Check Rhea Lot

on:
  workflow_dispatch:
    inputs:
      lot_number:
        description: "Rhea lot/address/source number to inspect"
        required: true
        default: "104"

jobs:
  check:
    name: Check Rhea lot
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: node scripts/check-rhea-lot.mjs "${{ inputs.lot_number }}"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
